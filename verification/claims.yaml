# RLJ claims ledger — the single source of truth for "what is verified".
#
# A claim is shown as ✅ Verified ONLY when its bound external test passed in the
# latest run. No human/LLM judgement sets these — verification/run.py reads the
# pytest/playwright results and stamps each claim. must_pass:true claims gate the
# build (make verify exits non-zero if any is not verified).
#
# status values (set by run.py, never by hand): verified | failing | unverified
# `test` is a pytest nodeid (file::test) or a substring that matches one.

claims:
  # ---- impact (the numbers we put on stage) -------------------------------
  - id: stat-compliance
    statement: "STAT samples meet their clinical window ≥95% of the time"
    category: impact
    must_pass: true
    test: "tests/backtests/test_routing_sla.py::test_stat_window_compliance"

  - id: beats-baseline
    statement: "Solver beats naive greedy dispatch on windows met"
    category: impact
    must_pass: true
    test: "tests/backtests/test_routing_sla.py::test_beats_greedy"

  - id: eta-sane
    statement: "Reported ETAs and total time are physically plausible (no scaling bug)"
    category: impact
    must_pass: true
    test: "tests/backtests/test_routing_sla.py::test_eta_plausibility"

  # ---- performance (the GPU / local story) --------------------------------
  - id: realtime-replan
    statement: "Re-optimises within the real-time budget"
    category: performance
    must_pass: true
    test: "tests/backtests/test_routing_sla.py::test_solve_budget"

  - id: no-regression
    statement: "Solver objective does not regress vs the golden baseline"
    category: performance
    must_pass: false
    test: "tests/backtests/test_routing_sla.py::test_golden_no_regression"

  # ---- contracts (cross-stream integrity) ---------------------------------
  - id: plan-schema
    statement: "Every Plan emitted validates against the shared schema"
    category: contract
    must_pass: true
    test: "tests/contracts/test_schema_conformance.py::test_plan_validates"

  - id: job-schema
    statement: "Every DeliveryJob accepted validates against the shared schema"
    category: contract
    must_pass: true
    test: "tests/contracts/test_schema_conformance.py::test_job_roundtrip_validates"

  - id: optimize-contract
    statement: "Routing /optimize honours the OptimizeRequest/Response contract"
    category: contract
    must_pass: true
    test: "tests/contracts/test_schema_conformance.py::test_optimize_endpoint_contract"

  # ---- data quality (only verified data is used) --------------------------
  - id: data-facilities-bbox
    statement: "All NHS facility coordinates lie within Greater London"
    category: data
    must_pass: true
    test: "tests/data_quality/test_facilities.py::test_within_london_bbox"

  - id: data-facilities-complete
    statement: "Facility dataset has no missing required fields or duplicate ids"
    category: data
    must_pass: true
    test: "tests/data_quality/test_facilities.py::test_required_fields_and_unique"

  - id: data-demand-valid
    statement: "Synthetic demand is schema-valid with sane time windows"
    category: data
    must_pass: true
    test: "tests/data_quality/test_demand.py::test_demand_schema_and_windows"

  - id: data-manifest-gate
    statement: "App only loads datasets whose data-quality suite passed (dq_passed=true)"
    category: data
    must_pass: true
    test: "tests/data_quality/test_manifest.py::test_only_verified_data_loadable"

  - id: data-roadgraph
    statement: "Road graph is connected and covers the London bbox"
    category: data
    must_pass: false
    test: "tests/data_quality/test_road_graph.py::test_graph_connected_and_bbox"

  # ---- research: anticipatory routing significantly beats baselines -------
  - id: research-anticipation-beats-reaction
    statement: "Schedule-anticipation significantly beats live-only reactive routing (paired Wilcoxon p<0.05)"
    category: research
    must_pass: true
    test: "tests/backtests/test_policy_value.py::test_anticipation_beats_reaction"

  - id: research-anticipation-beats-blind
    statement: "Schedule-anticipation significantly beats disruption-blind routing"
    category: research
    must_pass: true
    test: "tests/backtests/test_policy_value.py::test_anticipation_beats_blind"

  - id: research-beats-greedy
    statement: "Anticipatory method significantly beats naive greedy dispatch"
    category: research
    must_pass: true
    test: "tests/backtests/test_policy_value.py::test_beats_greedy_significantly"

  - id: research-beats-ortools
    statement: "Anticipatory method beats Google OR-Tools operating reactively (information advantage)"
    category: research
    must_pass: true
    test: "tests/backtests/test_policy_value.py::test_beats_or_tools_reactive"

  - id: research-generalises
    statement: "Anticipation also helps OR-Tools (effect is the information, not our solver)"
    category: research
    must_pass: false
    test: "tests/backtests/test_policy_value.py::test_anticipation_generalises_to_ortools"

  # ---- data quality: scheduled-signal feeds -------------------------------
  - id: data-signals-valid
    statement: "Tower Bridge + event timed-disruption feeds are schema-valid within London"
    category: data
    must_pass: true
    test: "tests/data_quality/test_signals.py::test_timed_events_valid"

  - id: data-signals-anticipation
    statement: "Horizon disruptions are a superset of active (schedule sees imminent closures reaction can't)"
    category: data
    must_pass: true
    test: "tests/data_quality/test_signals.py::test_active_and_horizon_consistency"

  # ---- autonomy (multi-agent sense->decide->act loop) ---------------------
  - id: autonomy-loop
    statement: "Autonomy controller detects crowdsourced congestion, re-plans around it, and dispatches"
    category: autonomy
    must_pass: true
    test: "tests/unit/test_autonomy.py::test_autonomy_loop_reacts_to_congestion"

  # ---- world-class solver quality + scale ---------------------------------
  - id: solver-optimality-gap
    statement: "Zero optimality gap vs Google OR-Tools on the clinical objective (static)"
    category: research
    must_pass: true
    test: "tests/backtests/test_solver_quality.py::test_optimality_gap_vs_ortools"

  - id: solver-scales
    statement: "Solver stays feasible and within time budget at fleet scale (40-80 jobs)"
    category: performance
    must_pass: true
    test: "tests/backtests/test_solver_quality.py::test_scales_to_large_fleets"

  # ---- data flywheel (crowdsourced congestion) ----------------------------
  - id: flywheel-value
    statement: "More contributing drivers significantly improve clinical STAT on-time (network effect)"
    category: research
    must_pass: true
    test: "tests/backtests/test_flywheel.py::test_more_drivers_help"

  - id: flywheel-monotone
    statement: "Flywheel benefit is monotone in driver participation"
    category: research
    must_pass: false
    test: "tests/backtests/test_flywheel.py::test_benefit_is_monotone"

  # ---- flywheel data feeds + voice ----------------------------------------
  - id: data-junctions
    statement: "Traffic-signal junctions + green-wave advice are schema-valid within London"
    category: data
    must_pass: true
    test: "tests/data_quality/test_junctions.py::test_junctions_valid"

  - id: data-probes
    statement: "Crowdsourced driver pings are schema-valid, in-bbox, and deterministic"
    category: data
    must_pass: true
    test: "tests/data_quality/test_probes.py::test_probe_pings_valid"

  - id: data-weather
    statement: "Weather congestion multiplier is sane and deterministic"
    category: data
    must_pass: false
    test: "tests/data_quality/test_weather.py::test_weather_multiplier_sane"

  - id: voice-driver-assistant
    statement: "Driver voice assistant routes the FAQ questions to the correct tools"
    category: e2e
    must_pass: true
    test: "tests/voice/test_driver_assistant.py::test_driver_assistant_answers"

  # ---- end-to-end demo (the thing we actually show) -----------------------
  - id: reroute-on-closure
    statement: "Closing a road triggers a live re-route and scoreboard update"
    category: e2e
    must_pass: true
    test: "tests/e2e/test_demo_flow.py::test_close_road_reroutes"

  - id: voice-loop
    statement: "A new job produces a voice_call dispatch notification"
    category: e2e
    must_pass: true
    test: "tests/e2e/test_demo_flow.py::test_voice_call_emitted"
