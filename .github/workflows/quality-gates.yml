name: quality-gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-and-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/pip install -r requirements-test.txt -r orchestrator/requirements.txt -r routing/requirements.txt

      - name: Run Python verification gate
        run: ./.venv/bin/python verification/run.py

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
